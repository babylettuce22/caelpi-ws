<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>caelpi</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #141420;
      --border: #1e1e30;
      --text: #e0e0e8;
      --dim: #6a6a80;
      --accent: #7c6fe0;
      --accent-dim: #5a4fb8;
      --danger: #e05050;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    header {
      margin-bottom: 48px;
    }

    /* Status */
    .status-section {
      margin-bottom: 40px;
      padding: 20px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .status-display {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 32px;
      cursor: pointer;
    }
    .status-display:hover { opacity: 0.8; }
    .status-emoji { font-size: 24px; }
    .status-text { font-size: 15px; color: var(--dim); }
    .status-text.empty { font-style: italic; }
    .status-form { display: none; gap: 8px; }
    .status-form.active { display: flex; }
    .status-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .status-form input:focus { border-color: var(--accent); }
    .emoji-input { width: 48px !important; flex: none !important; text-align: center; font-size: 18px; }

    /* Sections */
    .section { margin-bottom: 32px; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dim);
      font-weight: 600;
    }
    .add-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Items */
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 6px;
      transition: border-color 0.15s;
    }
    .item:hover { border-color: #2a2a40; }
    .item-text { font-size: 14px; flex: 1; }
    .item-meta { font-size: 11px; color: var(--dim); margin-left: 12px; }
    .item-delete {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      margin-left: 8px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .item:hover .item-delete { opacity: 1; }
    .item-delete:hover { color: var(--danger); }

    .link-url {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
    }
    .link-url:hover { text-decoration: underline; }
    .link-title {
      font-size: 12px;
      color: var(--dim);
      margin-top: 2px;
    }

    /* Add forms */
    .add-form {
      display: none;
      gap: 8px;
      margin-bottom: 8px;
    }
    .add-form.active { display: flex; }
    .add-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .add-form input:focus { border-color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--dim);
      font-size: 13px;
      font-style: italic;
    }

    /* Connection indicator */
    .conn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      transition: background 0.3s;
    }
    .conn.live { background: #50c878; }

    /* Time */
    .time {
      font-size: 48px;
      font-weight: 200;
      letter-spacing: -2px;
      color: var(--text);
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }
    .date {
      font-size: 14px;
      color: var(--dim);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="conn" id="conn"></div>
  <div class="container">
    <header>
      <div class="time" id="clock"></div>
      <div class="date" id="date"></div>
    </header>

    <div class="status-section">
      <div class="status-display" id="statusDisplay">
        <span class="status-emoji" id="statusEmoji"></span>
        <span class="status-text empty" id="statusText">set a status...</span>
      </div>
      <div class="status-form" id="statusForm">
        <input class="emoji-input" id="statusEmojiInput" maxlength="2" placeholder="&#128522;">
        <input id="statusTextInput" placeholder="what's happening?">
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Notes</span>
        <button class="add-btn" id="addNoteBtn">+</button>
      </div>
      <div class="add-form" id="noteForm">
        <input id="noteInput" placeholder="jot something down...">
      </div>
      <div id="notesList"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Links</span>
        <button class="add-btn" id="addLinkBtn">+</button>
      </div>
      <div class="add-form" id="linkForm">
        <input id="linkUrlInput" placeholder="url">
        <input id="linkTitleInput" placeholder="title (optional)">
      </div>
      <div id="linksList"></div>
    </div>
  </div>

  <script>
    var ws;
    var state = { status: {}, notes: [], links: [] };

    function connect() {
      var proto = location.protocol === "https:" ? "wss://" : "ws://";
      ws = new WebSocket(proto + location.host);
      ws.onopen = function() { document.getElementById("conn").classList.add("live"); };
      ws.onclose = function() {
        document.getElementById("conn").classList.remove("live");
        setTimeout(connect, 3000);
      };
      ws.onmessage = function(e) {
        var msg = JSON.parse(e.data);
        if (msg.type === "status") { state.status = msg.data; renderStatus(); }
        if (msg.type === "note_added") { state.notes.unshift(msg.data); renderNotes(); }
        if (msg.type === "note_deleted") { state.notes = state.notes.filter(function(n) { return n.id !== msg.data.id; }); renderNotes(); }
        if (msg.type === "link_added") { state.links.unshift(msg.data); renderLinks(); }
        if (msg.type === "link_deleted") { state.links = state.links.filter(function(l) { return l.id !== msg.data.id; }); renderLinks(); }
      };
    }

    function loadData() {
      fetch("/api/sync").then(function(res) { return res.json(); }).then(function(data) {
        state = data;
        renderAll();
      });
    }

    function renderAll() {
      renderStatus();
      renderNotes();
      renderLinks();
    }

    function renderStatus() {
      var s = state.status;
      var emoji = document.getElementById("statusEmoji");
      var text = document.getElementById("statusText");
      emoji.textContent = s.emoji || "";
      if (s.text) {
        text.textContent = s.text;
        text.classList.remove("empty");
      } else {
        text.textContent = "set a status...";
        text.classList.add("empty");
      }
    }

    function editStatus() {
      var display = document.getElementById("statusDisplay");
      var form = document.getElementById("statusForm");
      display.style.display = "none";
      form.classList.add("active");
      document.getElementById("statusEmojiInput").value = state.status.emoji || "";
      document.getElementById("statusTextInput").value = state.status.text || "";
      document.getElementById("statusTextInput").focus();
    }

    function saveStatus() {
      var emoji = document.getElementById("statusEmojiInput").value;
      var text = document.getElementById("statusTextInput").value;
      fetch("/api/status", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ emoji: emoji, text: text })
      });
      document.getElementById("statusDisplay").style.display = "flex";
      document.getElementById("statusForm").classList.remove("active");
    }

    function cancelStatus() {
      document.getElementById("statusDisplay").style.display = "flex";
      document.getElementById("statusForm").classList.remove("active");
    }

    function escHtml(s) {
      var d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function escAttr(s) {
      return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function timeAgo(iso) {
      var diff = Date.now() - new Date(iso).getTime();
      var m = Math.floor(diff / 60000);
      if (m < 1) return "now";
      if (m < 60) return m + "m";
      var h = Math.floor(m / 60);
      if (h < 24) return h + "h";
      var d = Math.floor(h / 24);
      return d + "d";
    }

    function renderNotes() {
      var el = document.getElementById("notesList");
      if (!state.notes.length) {
        el.innerHTML = '<div class="empty-state">no notes yet</div>';
        return;
      }
      el.innerHTML = state.notes.map(function(n) {
        var ago = timeAgo(n.createdAt);
        return '<div class="item">' +
          '<span class="item-text">' + escHtml(n.text) + '</span>' +
          '<span class="item-meta">' + ago + '</span>' +
          '<button class="item-delete" data-delete-note="' + n.id + '">&times;</button>' +
          '</div>';
      }).join("");
    }

    function renderLinks() {
      var el = document.getElementById("linksList");
      if (!state.links.length) {
        el.innerHTML = '<div class="empty-state">no links yet</div>';
        return;
      }
      el.innerHTML = state.links.map(function(l) {
        var display = l.url.replace(/^https?:\/\//, "").replace(/\/$/, "");
        return '<div class="item"><div>' +
          '<a class="link-url" href="' + escAttr(l.url) + '" target="_blank" rel="noopener">' + escHtml(l.title || display) + '</a>' +
          (l.title ? '<div class="link-title">' + escHtml(display) + '</div>' : '') +
          '</div>' +
          '<button class="item-delete" data-delete-link="' + l.id + '">&times;</button>' +
          '</div>';
      }).join("");
    }

    function addNote() {
      var input = document.getElementById("noteInput");
      var text = input.value.trim();
      if (!text) return;
      fetch("/api/notes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text })
      });
      input.value = "";
    }

    function addLink() {
      var urlInput = document.getElementById("linkUrlInput");
      var titleInput = document.getElementById("linkTitleInput");
      var url = urlInput.value.trim();
      var title = titleInput.value.trim();
      if (!url) return;
      if (!/^https?:\/\//.test(url)) url = "https://" + url;
      fetch("/api/links", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: url, title: title })
      });
      urlInput.value = "";
      titleInput.value = "";
    }

    function toggleForm(id) {
      var form = document.getElementById(id);
      var isActive = form.classList.contains("active");
      form.classList.toggle("active");
      if (!isActive) form.querySelector("input").focus();
    }

    function updateClock() {
      var now = new Date();
      document.getElementById("clock").textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      document.getElementById("date").textContent = now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
    }

    // Event listeners
    document.getElementById("statusDisplay").addEventListener("click", editStatus);

    document.getElementById("statusForm").addEventListener("keydown", function(e) {
      if (e.key === "Enter") saveStatus();
      if (e.key === "Escape") cancelStatus();
    });

    document.getElementById("addNoteBtn").addEventListener("click", function() { toggleForm("noteForm"); });
    document.getElementById("addLinkBtn").addEventListener("click", function() { toggleForm("linkForm"); });

    document.getElementById("noteInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") addNote();
    });

    document.getElementById("linkUrlInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") document.getElementById("linkTitleInput").focus();
    });

    document.getElementById("linkTitleInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") addLink();
    });

    // Delegated click handlers for dynamic delete buttons
    document.addEventListener("click", function(e) {
      var noteId = e.target.getAttribute("data-delete-note");
      if (noteId) {
        fetch("/api/notes/" + noteId, { method: "DELETE" });
        return;
      }
      var linkId = e.target.getAttribute("data-delete-link");
      if (linkId) {
        fetch("/api/links/" + linkId, { method: "DELETE" });
      }
    });

    updateClock();
    setInterval(updateClock, 1000);
    connect();
    loadData();
  </script>
</body>
</html>
